<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GraceProposal — Saved Proposals</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Bebas+Neue&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #070B56;
      --navy-deep: #04072e;
      --gold: #FFD700;
      --gold-glow: rgba(255,215,0,0.12);
      --gold-border: rgba(255,215,0,0.15);
      --white: #ffffff;
      --white-soft: rgba(255,255,255,0.06);
      --white-muted: rgba(255,255,255,0.4);
      --sidebar-w: 240px;
      --green: #2ecc71;
      --red: #e74c3c;
      --amber: #f39c12;
      --blue: #3498db;
    }

    html, body {
      height: 100%;
      background: var(--navy-deep);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--white);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: rgba(4,7,46,0.95);
      border-right: 1px solid var(--gold-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
    }

    .sidebar-brand {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--gold-border);
    }

    .sidebar-brand-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.25em;
      color: rgba(255,215,0,0.5);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .sidebar-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--white);
      line-height: 1;
    }

    .sidebar-brand-name span { color: var(--gold); }

    .sidebar-nav {
      flex: 1;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-section-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--white-muted);
      text-transform: uppercase;
      padding: 8px 12px 6px;
      margin-top: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--white-muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
      border: 1px solid transparent;
    }

    .nav-item:hover { background: var(--white-soft); color: var(--white); }

    .nav-item.active {
      background: var(--gold-glow);
      color: var(--gold);
      border-color: var(--gold-border);
    }

    .nav-icon { width: 18px; font-size: 14px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--gold-border);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      background: none;
      border: 1px solid rgba(231,76,60,0.2);
      color: rgba(231,76,60,0.7);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: rgba(231,76,60,0.08);
      color: #e74c3c;
      border-color: rgba(231,76,60,0.4);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(4,7,46,0.6);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
    }

    .topbar-links {
      display: flex;
      gap: 20px;
    }

    .topbar-link {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--white-muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .topbar-link:hover { color: var(--gold); }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 4px; }

    /* ── FILTERS ── */
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-tab {
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid var(--gold-border);
      background: none;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--white-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab:hover {
      color: var(--white);
      border-color: rgba(255,255,255,0.3);
    }

    .filter-tab.active {
      background: var(--gold-glow);
      border-color: rgba(255,215,0,0.4);
      color: var(--gold);
    }

    .search-wrap {
      position: relative;
      margin-left: auto;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--white-muted);
      font-size: 12px;
    }

    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 8px 14px 8px 34px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--white);
      outline: none;
      width: 220px;
    }

    .search-input:focus { border-color: rgba(255,215,0,0.4); }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }

    /* ── TABLE ── */
    .table-wrap {
      background: rgba(13,18,112,0.2);
      border: 1px solid var(--gold-border);
      border-radius: 12px;
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    .data-table th {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--white-muted);
      text-transform: uppercase;
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--gold-border);
      background: rgba(0,0,0,0.15);
    }

    .data-table td {
      font-family: 'Inter', sans-serif;
      padding: 14px 20px;
      font-size: 12px;
      color: var(--white);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: rgba(255,215,0,0.02); }

    /* Status badges */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .status-draft {
      background: rgba(52,152,219,0.12);
      color: var(--blue);
      border: 1px solid rgba(52,152,219,0.25);
    }

    .status-sent {
      background: rgba(243,156,18,0.12);
      color: var(--amber);
      border: 1px solid rgba(243,156,18,0.25);
    }

    .status-accepted {
      background: rgba(46,204,113,0.12);
      color: var(--green);
      border: 1px solid rgba(46,204,113,0.25);
    }

    .status-declined {
      background: rgba(231,76,60,0.12);
      color: var(--red);
      border: 1px solid rgba(231,76,60,0.25);
    }

    /* Action buttons */
    .action-group {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--gold-border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--white-muted);
    }

    .icon-btn:hover {
      background: var(--gold-glow);
      color: var(--gold);
      border-color: rgba(255,215,0,0.4);
    }

    .icon-btn.delete:hover {
      background: rgba(231,76,60,0.08);
      color: var(--red);
      border-color: rgba(231,76,60,0.3);
    }

    /* Empty state */
    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--white-muted);
      font-size: 12px;
    }

    .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,7,46,0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .confirm-modal {
      background: #080d4a;
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .confirm-icon { font-size: 36px; margin-bottom: 16px; }
    .confirm-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; }
    .confirm-text { font-size: 11px; color: var(--white-muted); line-height: 1.8; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    .btn-cancel {
      padding: 11px 24px;
      background: none;
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--white-muted);
      cursor: pointer;
    }

    .btn-cancel:hover { color: var(--white); }

    .btn-danger {
      padding: 11px 24px;
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.4);
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--red);
      cursor: pointer;
    }

    .btn-danger:hover { background: rgba(231,76,60,0.25); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #080d4a;
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 12px;
      z-index: 200;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .toast.show { display: flex; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -100%;
        top: 0;
        bottom: 0;
        width: 80%;
        max-width: 280px;
        z-index: 1000;
        transition: left 0.3s ease;
        background: rgba(4,7,46,0.98);
      }
      .sidebar.open { left: 0; }
      .main { width: 100%; }
      .topbar { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
      .topbar-title { font-size: 18px; }
      .content { padding: 20px; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .search-wrap { margin-left: 0; }
      .search-input { width: 100%; }
    }

    .menu-toggle {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1001;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 18px;
      color: var(--navy-deep);
      display: none;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

<div class="app">
  <button class="menu-toggle" id="menuToggle">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-eyebrow">GOD'S GRACE ULTRA</div>
      <div class="sidebar-brand-name">Grace<span>Proposal</span></div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a class="nav-item" href="create-proposal.html"><span class="nav-icon">✚</span> New Proposal</a>
      <a class="nav-item active" href="proposals.html"><span class="nav-icon">📋</span> Saved Proposals</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn"><span>⏻</span> Sign Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Saved Proposals</div>
      <div class="topbar-links">
        <a href="create-proposal.html" class="topbar-link">+ New Proposal</a>
      </div>
    </div>

    <div class="content">
      <div class="filter-bar">
        <button class="filter-tab active" data-status="all">All</button>
        <button class="filter-tab" data-status="draft">Draft</button>
        <button class="filter-tab" data-status="sent">Sent</button>
        <button class="filter-tab" data-status="accepted">Accepted</button>
        <button class="filter-tab" data-status="declined">Declined</button>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="searchInput" placeholder="Search by client..." />
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Created</th>
              <th>Status</th>
              <th>Actions</th>
            </thead>
          <tbody id="proposalsTableBody">
            <tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📋</div>Loading proposals...</div> </td> </tr>
          </tbody>
         </table>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Proposal?</div>
    <div class="confirm-text" id="deleteConfirmText">This cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="cancelDelete">Cancel</button>
      <button class="btn-danger" id="confirmDelete">DELETE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Mobile menu
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  if (menuToggle && sidebar) {
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });
  }

  // Auth guard
  if (sessionStorage.getItem('gp_auth') !== 'true') window.location.href = 'index.html';

  // Supabase
  const SUPABASE_URL = 'https://gwvhryfpefhntylnmjqx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3dmhyeWZwZWZobnR5bG5tanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTM4NzQsImV4cCI6MjA5MDM2OTg3NH0.AMfpcQQ-kzkjmnu_POaNR_IXqCBuVJjOoBp7cgvQcOk';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('gp_auth');
    window.location.href = 'index.html';
  });

  let allProposals = [];
  let activeFilter = 'all';
  let deleteTargetId = null;

  function formatCurrency(amount) {
    if (!amount) return '—';
    return '$' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    const icon = type === 'success' ? '✅' : type === 'error' ? '⚠️' : 'ℹ️';
    toast.innerHTML = `${icon} ${msg}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function updateStatus(id, newStatus) {
    const { error } = await db.from('proposals').update({ status: newStatus }).eq('id', id);
    if (error) { showToast('Failed to update status.', 'error'); return false; }
    showToast(`Status updated to ${newStatus}.`, 'success');
    await loadProposals();
    return true;
  }

  async function deleteProposal(id) {
    const { error } = await db.from('proposals').delete().eq('id', id);
    if (error) { showToast('Delete failed.', 'error'); return false; }
    showToast('Proposal deleted.', 'success');
    await loadProposals();
    return true;
  }

  function renderTable(proposals) {
    const tbody = document.getElementById('proposalsTableBody');
    if (proposals.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-state-icon">📋</div>No proposals found.<br><a href="create-proposal.html" style="color:var(--gold);">Create your first proposal →</a></div></td></tr>`;
      return;
    }
    tbody.innerHTML = proposals.map(p => `
      <tr>
        <td><strong>${escapeHtml(p.client_name)}</strong>${p.client_company ? `<br><span style="font-size:10px;color:var(--white-muted);">${escapeHtml(p.client_company)}</span>` : ''}</td>
        <td style="font-size:11px;color:var(--white-muted);">${escapeHtml(p.service_type || '—')}</td>
        <td class="amount-cell" style="color:var(--gold);font-weight:500;">${formatCurrency(p.investment_usd)}</td>
        <td style="font-size:11px;color:var(--white-muted);">${formatDate(p.created_at)}</td>
        <td><select class="status-select" data-id="${p.id}" style="background:transparent;border:1px solid var(--gold-border);border-radius:6px;padding:4px 8px;color:var(--white);font-size:11px;cursor:pointer;">${getStatusOptions(p.status)}</select></td>
        <td class="action-group">
          <button class="icon-btn pdf-btn" data-id="${p.id}">📄 PDF</button>
          <button class="icon-btn delete" data-id="${p.id}">🗑️</button>
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.status-select').forEach(select => {
      select.addEventListener('change', (e) => {
        e.stopPropagation();
        updateStatus(select.dataset.id, select.value);
      });
    });

    document.querySelectorAll('.pdf-btn').forEach(btn => {
      btn.addEventListener('click', () => generatePDF(btn.dataset.id));
    });

    document.querySelectorAll('.icon-btn.delete').forEach(btn => {
      btn.addEventListener('click', () => {
        const proposal = proposals.find(p => p.id === btn.dataset.id);
        deleteTargetId = btn.dataset.id;
        document.getElementById('deleteConfirmText').innerHTML = `Delete proposal for <strong>${escapeHtml(proposal.client_name)}</strong>? This cannot be undone.`;
        document.getElementById('deleteModal').classList.add('open');
      });
    });
  }

  function getStatusOptions(current) {
    const statuses = ['draft', 'sent', 'accepted', 'declined'];
    return statuses.map(s => `<option value="${s}" ${s === current ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function loadProposals() {
    const { data, error } = await db.from('proposals').select('*').order('created_at', { ascending: false });
    if (error) { showToast('Failed to load proposals.', 'error'); return; }
    allProposals = data || [];
    applyFilters();
  }

  function applyFilters() {
    let filtered = [...allProposals];
    if (activeFilter !== 'all') filtered = filtered.filter(p => p.status === activeFilter);
    const search = document.getElementById('searchInput').value.toLowerCase();
    if (search) filtered = filtered.filter(p => p.client_name.toLowerCase().includes(search) || (p.client_company || '').toLowerCase().includes(search));
    renderTable(filtered);
  }

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.status;
      applyFilters();
    });
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);

  document.getElementById('cancelDelete').addEventListener('click', () => {
    document.getElementById('deleteModal').classList.remove('open');
    deleteTargetId = null;
  });
  document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (deleteTargetId) await deleteProposal(deleteTargetId);
    document.getElementById('deleteModal').classList.remove('open');
    deleteTargetId = null;
  });

  // PROFESSIONAL PDF GENERATION - Black content like GraceLedger invoice
  async function generatePDF(id) {
    const proposal = allProposals.find(p => p.id === id);
    if (!proposal) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210;
    const margin = 20;

    // ========== HEADER ==========
    doc.setFillColor(7, 11, 86);
    doc.rect(0, 0, W, 55, 'F');

    doc.setTextColor(255, 215, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(24);
    doc.text("GOD'S GRACE ULTRA", margin, 25);
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(180, 185, 220);
    doc.text('Great things begin where clarity meets action', margin, 35);
    
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(255, 215, 0);
    doc.text('PROPOSAL', W - margin, 28, { align: 'right' });
    
    doc.setFontSize(8);
    doc.setTextColor(200, 210, 255);
    doc.text(`Issued: ${new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}`, W - margin, 38, { align: 'right' });

    // ========== PREPARED FOR ==========
    let y = 70;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(100, 110, 160);
    doc.text('PREPARED FOR', margin, y);
    y += 6;
    
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.setTextColor(20, 20, 20);
    doc.text(proposal.client_name, margin, y);
    
    if (proposal.client_company) {
      y += 5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      doc.text(proposal.client_company, margin, y);
    }
    
    y += 12;

    // ========== SERVICE TYPE (Ensuring it displays) ==========
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(100, 110, 160);
    doc.text('SERVICE TYPE', margin, y);
    y += 6;
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(20, 20, 20);
    doc.text(proposal.service_type || 'Consulting Services', margin, y);
    y += 12;

    // ========== PROJECT SCOPE ==========
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(100, 110, 160);
    doc.text('PROJECT SCOPE', margin, y);
    y += 6;
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(20, 20, 20);
    const scopeLines = doc.splitTextToSize(proposal.project_scope || 'Not specified', W - margin * 2);
    doc.text(scopeLines, margin, y);
    y += (scopeLines.length * 5) + 8;

    // ========== TIMELINE ==========
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(100, 110, 160);
    doc.text('TIMELINE', margin, y);
    y += 6;
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(20, 20, 20);
    doc.text(proposal.timeline || 'To be confirmed', margin, y);
    y += 12;

    // ========== WHAT'S INCLUDED ==========
    if (proposal.whats_included && proposal.whats_included.trim()) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(100, 110, 160);
      doc.text('WHAT\'S INCLUDED', margin, y);
      y += 6;
      
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(20, 20, 20);
      let includedText = proposal.whats_included;
      if (!includedText.includes('•') && !includedText.includes('-')) {
        includedText = includedText.split('\n').map(line => `• ${line.trim()}`).join('\n');
      }
      const includedLines = doc.splitTextToSize(includedText, W - margin * 2);
      doc.text(includedLines, margin, y);
      y += (includedLines.length * 4.5) + 10;
    }

    // ========== INVESTMENT ==========
    doc.setDrawColor(230, 230, 240);
    doc.setLineWidth(0.4);
    doc.line(margin, y, W - margin, y);
    y += 8;
    
    doc.setFillColor(7, 11, 86);
    doc.rect(W - margin - 70, y - 4, 70, 14, 'F');
    
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(180, 185, 220);
    doc.text('TOTAL INVESTMENT', W - margin - 35, y + 3, { align: 'center' });
    
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(255, 215, 0);
    doc.text(formatCurrency(proposal.investment_usd), W - margin - 3, y + 9, { align: 'right' });
    
    y += 20;

    // ========== TERMS ==========
    if (y < 240) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(100, 110, 160);
      doc.text('TERMS', margin, y);
      y += 5;
      
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.setTextColor(100, 110, 160);
      doc.text('This proposal is valid for 30 days from the date of issue.', margin, y);
      y += 4;
      doc.text('Payment terms: 50% upfront, 50% upon completion.', margin, y);
    }

    // ========== FOOTER ==========
    const footerY = 272;
    doc.setFillColor(7, 11, 86);
    doc.rect(0, footerY, W, 25, 'F');
    
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(180, 185, 220);
    doc.text("GOD'S GRACE ULTRA  ·  Data Intelligence Consultancy", W / 2, footerY + 9, { align: 'center' });
    doc.setTextColor(255, 215, 0);
    doc.text('Great things begin where clarity meets action', W / 2, footerY + 16, { align: 'center' });

    doc.save(`${proposal.client_name.replace(/\s+/g, '_')}_Proposal.pdf`);
    showToast('Professional PDF generated!', 'success');
  }

  loadProposals();
</script>
